[main]
font=IosevkaTerm Nerd Font Mono:size=16
line-height=26
dpi-aware=no
icons-enabled=yes
icon-theme=Reversal-black
prompt=" 󰍉 "
terminal=ghostty -e
match-mode=fzf
anchor=center
width=60
lines=11
horizontal-pad=16
vertical-pad=12
inner-pad=10
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
# Very dark, near-black background
background=0d0d0dea
# Input area slightly lighter to visually separate it
input=f7f7f7ff
text=c0c0c0ff
match=ffffffff
# Medium-dark gray for selected row — matches the image highlight
selection=2e2e2eff
selection-text=ffffffff
selection-match=ffffffff
border=1a1a1aff

[border]
# Subtle radius — rectangular feel, not pill
width=2
radius=6

[dmenu]
mode=text
