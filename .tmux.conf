# ── Core ─────────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:RGB"
set -g focus-events on
set -g status-position top

# ── Vi mode + clipboard ───────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"          # Wayland
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"           # macOS
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Windows ───────────────────────────────────────────────────────────────────
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

bind c new-window -c "#{pane_current_path}"

bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Splits & panes ────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z

bind b break-pane -d
bind B choose-window "join-pane -s '%%'"
bind x kill-pane
bind X kill-window

bind e setw synchronize-panes \; display "sync #{?pane_synchronized,ON,OFF}"

# ── Smart pane switching (plugin-free vim-tmux-navigator) ─────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ── Session ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "reloaded"
bind S choose-session
bind C-s run-shell 'tmux list-windows -a -F "#{session_name} #{window_name} #{pane_current_path}" > ~/.tmux-sessions.txt' \; display "sessions saved"

bind -r w run-shell "~/.local/bin/tmux-workspace"
bind -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# ── Popups ────────────────────────────────────────────────────────────────────
bind -n M-Enter display-popup -E -w 75% -h 75% -d "#{pane_current_path}" "${SHELL}"
bind -r g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# ── Theme (Noir Monochrome) ───────────────────────────────────────────────────
set -g status-style                  "bg=#060606,fg=#e2e0d4"
set -g status-left-length            100
set -g status-right-length           100
set -g status-justify                left
set -g window-status-separator       ""

set -g status-left  "#[fg=#060606,bg=#e2e0d4,bold] #S #[fg=#e2e0d4,bg=#060606] "
set -g status-right " #[fg=#1a1a1a,bg=#060606]#[fg=#e2e0d4,bg=#1a1a1a] %H:%M #[fg=#1a1a1a,bg=#060606]"

set -g window-status-format         "#[fg=#6f6f64,bg=#060606] #I:#W "
set -g window-status-current-format "#[fg=#1a1a1a,bg=#060606]#[fg=#e2e0d4,bg=#1a1a1a] #I:#W #[fg=#1a1a1a,bg=#060606]"

set -g pane-border-style            "fg=#0f0f0f"
set -g pane-active-border-style     "fg=#2a2a2a"
set -g message-style                "bg=#1a1a1a,fg=#e2e0d4"
